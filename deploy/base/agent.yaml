apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: agent-azuresdk-demo-ogx-native
  labels:
    app: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      containers:
        - name: agent
          image: agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8501
          # Env fully replaced by overlay agent-env-patch.yaml ($patch: replace)
          env: []
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              memory: 3Gi
---
apiVersion: v1
kind: Service
metadata:
  name: agent
  namespace: agent-azuresdk-demo-ogx-native
spec:
  selector:
    app: agent
  ports:
    - name: http
      port: 8501
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: agent
  namespace: agent-azuresdk-demo-ogx-native
spec:
  to:
    kind: Service
    name: agent
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
