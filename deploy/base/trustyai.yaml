# TrustyAI Guardrails Orchestrator — wires into Llama Stack safety provider (trustyai_fms).
# Requires InferenceService name for autoConfig; points at the in-cluster sample vLLM.
apiVersion: trustyai.opendatahub.io/v1alpha1
kind: GuardrailsOrchestrator
metadata:
  name: guardrails
  namespace: agent-azuresdk-demo-ogx-native
spec:
  replicas: 1
  enableBuiltInDetectors: true
  autoConfig:
    inferenceServiceToGuardrail: llama-32-3b-instruct
    detectorServiceLabelToMatch: trustyai/guardrails
