apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-azuresdk-demo-main
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: agent-azuresdk-demo
spec:
  project: default
  source:
    repoURL: https://github.com/maschind/agent-azuresdk-demo.git
    targetRevision: main
    path: deploy/overlays/main
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-azuresdk-demo-main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
