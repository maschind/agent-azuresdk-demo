apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-azuresdk-demo-ogx
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: agent-azuresdk-demo
  finalizers:
    - resources-finalizer.argocd.argoproj.io/cascade-foreground
spec:
  project: default
  source:
    repoURL: https://github.com/maschind/agent-azuresdk-demo.git
    targetRevision: ogx
    path: deploy/overlays/ogx
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-azuresdk-demo-ogx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
  # Secrets use stringData in git → data at rest; ignore byte encoding drift.
  # Out-of-band Secrets (llm-credentials, llama-stack-inference) are not in git.
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
        - /stringData
    - group: llamastack.io
      kind: LlamaStackDistribution
      jsonPointers:
        - /status
        - /metadata/annotations
