# Example PipelineRun — create with:
#   oc create -f deploy/tekton/pipelinerun-ogx.yaml -n agent-azuresdk-demo-ogx
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: agent-build-ogx-
  namespace: agent-azuresdk-demo-ogx
spec:
  pipelineRef:
    name: agent-build-ogx
  params:
    - name: git-url
      value: https://github.com/maschind/agent-azuresdk-demo.git
    - name: git-revision
      value: ogx
    - name: image-tag
      value: v0.2.0
  taskRunTemplate:
    serviceAccountName: pipeline
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: agent-build-workspace
