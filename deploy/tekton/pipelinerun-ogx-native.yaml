# Example PipelineRun — create with:
#   oc create -f deploy/tekton/pipelinerun-ogx-native.yaml -n agent-azuresdk-demo-ogx-native
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: agent-build-ogx-native-
  namespace: agent-azuresdk-demo-ogx-native
spec:
  pipelineRef:
    name: agent-build-ogx-native
  params:
    - name: git-url
      value: https://github.com/maschind/agent-azuresdk-demo.git
    - name: git-revision
      value: ogx-native
    - name: image-tag
      value: v0.1.1
  taskRunTemplate:
    serviceAccountName: pipeline
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: agent-build-workspace
