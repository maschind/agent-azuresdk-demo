apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
spec:
  template:
    spec:
      containers:
        - name: agent
          env:
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: LLM_API_KEY
            - name: LLM_BASE_URL
              value: http://llamastack-demo-service:8321/v1
            - name: LLM_MODEL
              value: vllm-inference/llama-32-3b-instruct
            - name: AGENT_BACKEND
              value: native
            - name: MODEL_PROVIDER
              value: llamastack
            - name: ENABLE_LLAMA_STACK_PROVIDER
              value: "true"
            - name: ENABLE_PROVIDER_BYPASS
              value: "false"
            - name: RAG_BACKEND
              value: stack
            - name: LLAMA_STACK_BASE_URL
              value: http://llamastack-demo-service:8321/v1
            - name: LLAMA_STACK_MODEL
              value: vllm-inference/llama-32-3b-instruct
            - name: STACK_VECTOR_STORE_NAME
              value: agent-kb
            - name: STACK_EMBEDDING_MODEL
              value: sentence-transformers/nomic-ai/nomic-embed-text-v1.5
            - name: MLFLOW_TRACKING_URI
              # Agent-local file store (ODH MLflow workspace API requires project binding + artifact secret).
              value: file:///tmp/mlruns
            - name: MLFLOW_UI_URL
              value: https://rh-ai.apps.ocp.9jkcd.sandbox3005.opentlc.com/mlflow
            - name: MLFLOW_EXPERIMENT
              value: agent-azuresdk-demo-ogx-native
            - name: MLFLOW_TRACING_ENABLED
              value: "true"
            # Matches GuardrailsOrchestrator autoConfig detector id (my-first-model)
            - name: TRUSTYAI_SHIELD_ID
              value: built-in-detector
            - name: TRUSTYAI_ORCHESTRATOR_URL
              value: https://guardrails-service.my-first-model.svc:8032
